server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Content-hashed build assets are immutable (the hash changes when the
    # content does), so cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the app shell or the service worker. Without this the browser
    # keeps serving a stale index.html that references an OLD bundle, so a Docker
    # rebuild is invisible until a manual hard-refresh. no-cache forces a
    # revalidate on every load, so a new build is always picked up.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
