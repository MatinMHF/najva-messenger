listening-port=3478
tls-listening-port=5349
alt-listening-port=443

min-port=49152
max-port=49200

realm=najva.local

fingerprint

# Time-limited REST credentials (coturn "use-auth-secret" scheme). The main
# server mints username="<expiry>:<userId>" + credential=base64(HMAC-SHA1(secret,
# username)) in CallService.iceServers(); this secret MUST equal TURN_SECRET in
# .env so coturn validates them. (Replaces the old static long-term user.)
use-auth-secret
static-auth-secret=dev-turn-static-auth-secret-change-in-prod

# TURN over TLS ("turns:") on 5349 + 443 so relayed media looks like HTTPS and
# survives DPI / UDP blocking. Requires a certificate; generate a dev self-signed
# pair into ./turn (mounted at /etc/coturn):
#   openssl req -x509 -newkey rsa:2048 -nodes -keyout turn/turn_pkey.pem \
#     -out turn/turn_cert.pem -days 365 -subj "/CN=najva.local"
# Without the cert, coturn still serves TURN over UDP/TCP on 3478 (the UDP-blocked
# fallback), only the TLS ports stay down.
cert=/etc/coturn/turn_cert.pem
pkey=/etc/coturn/turn_pkey.pem

total-quota=100
max-bps=1000000

# TURN over TCP (3478) + TLS (5349/443) is the critical fallback for networks
# where UDP is blocked or there is no direct client-to-client path — the client
# ICE list includes turn:...transport=tcp and turns:...transport=tcp.
no-multicast-peers

# Denied peer IPs for security (private ranges)
# Commented out for local development to allow relaying to host browser LAN IPs and Docker subnets
# denied-peer-ip=10.0.0.0-10.255.255.255
# denied-peer-ip=192.168.0.0-192.168.255.255
# Commented out to allow relaying to media-server and other containers on Docker's 172.18.0.0/16 bridge network
# denied-peer-ip=172.16.0.0-172.31.255.255

verbose

# Advertise the WSL2 VM IP as the external IP so the host browser can route UDP/TCP relay traffic
# directly to coturn via the WSL2 virtual interface.
external-ip=172.23.191.158
