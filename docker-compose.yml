version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - najva-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - najva-network
    restart: unless-stopped

  server:
    build:
      context: ./server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      MEDIA_SERVER_URL: http://media-server:4443
    volumes:
      - uploads:/app/uploads
    networks:
      - najva-network
    restart: unless-stopped

  client:
    build:
      context: ./client
    networks:
      - najva-network
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - server
      - client
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - najva-network
    restart: unless-stopped

  turn:
    image: coturn/coturn:latest
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "5349:5349/tcp"
      - "5349:5349/udp"
      - "49152-49200:49152-49200/udp"
    volumes:
      - ./turn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    networks:
      - najva-network
    restart: unless-stopped

  media-server:
    build:
      context: ./media-server
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "2000-2020:2000-2020/udp"
      - "4443:4443/tcp"
    env_file: .env
    environment:
      - DEBUG=mediasoup*
    networks:
      - najva-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads:

networks:
  najva-network:
    driver: bridge
